<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi cuenta — Lana &amp; Lino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/forms.css">
</head>
<body>

  <input type="checkbox" id="dark-mode" class="dark-mode-toggle">

  <div class="page-wrapper">

    <header class="header">
      <div class="header-inner">
        <div class="header-left">
          <nav class="dropdown">
            <button class="dropdown-trigger">Productos <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg></button>
            <div class="dropdown-menu">
              <a href="index.html">Todos los productos</a>
              <hr class="dropdown-divider">
              <a href="#">Remeras</a><a href="#">Buzos</a>
            </div>
          </nav>
          <div class="header-search">
            <input type="text" placeholder="Buscar productos...">
            <button type="button"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></button>
          </div>
        </div>
        <div class="header-logo"><a href="index.html">Lana &amp; Lino</a></div>
        <div class="header-actions">
          <a href="favorites.html" class="icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></a>
          <!-- When logged in, show "Cerrar sesión" -->
          <button class="btn-session" type="button">Cerrar sesión</button>
          <a href="cart.html" class="icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg><span class="badge">2</span></a>
          <a href="profile.html" class="icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></a>
          <label for="dark-mode" class="dark-toggle-label"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></label>
        </div>
      </div>
    </header>

    <main class="main">

      <div class="page-header">
        <div class="page-header-inner">
          <h1>Mi cuenta</h1>
          <p>Administrá tus datos personales</p>
        </div>
      </div>

      <div class="profile-layout">
        <div class="profile-card">

          <div class="profile-header-row">
            <div class="profile-avatar">JP</div>
            <div>
              <h2 class="profile-info-name">Juan Pérez</h2>
              <p class="profile-info-email">juan.perez@email.com</p>
            </div>
          </div>

          <p class="profile-section-title">Datos personales</p>

          <form class="profile-form" action="#" method="post" novalidate>
            <div class="profile-row">
              <div class="form-group">
                <label class="form-label" for="pf-nombre">Nombre</label>
                <input class="form-input" type="text" id="pf-nombre" value="Juan" autocomplete="given-name">
              </div>
              <div class="form-group">
                <label class="form-label" for="pf-apellido">Apellido</label>
                <input class="form-input" type="text" id="pf-apellido" value="Pérez" autocomplete="family-name">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="pf-email">Email</label>
              <input class="form-input" type="email" id="pf-email" value="juan.perez@email.com" autocomplete="email">
            </div>
            <div class="form-group">
              <label class="form-label" for="pf-telefono">Teléfono</label>
              <input class="form-input" type="tel" id="pf-telefono" value="+54 11 1234-5678" autocomplete="tel">
            </div>
            <div class="form-group">
              <label class="form-label" for="pf-direccion">Dirección</label>
              <input class="form-input" type="text" id="pf-direccion" value="Av. Corrientes 1234, CABA" autocomplete="street-address">
            </div>

            <hr class="divider">

            <p class="profile-section-title">Cambiar contraseña</p>
            <div class="form-group">
              <label class="form-label" for="pf-pass-actual">Contraseña actual</label>
              <input class="form-input" type="password" id="pf-pass-actual" placeholder="••••••••" autocomplete="current-password">
            </div>
            <div class="profile-row">
              <div class="form-group">
                <label class="form-label" for="pf-pass-nueva">Nueva contraseña</label>
                <input class="form-input" type="password" id="pf-pass-nueva" placeholder="••••••••" autocomplete="new-password">
              </div>
              <div class="form-group">
                <label class="form-label" for="pf-pass-confirm">Confirmar contraseña</label>
                <input class="form-input" type="password" id="pf-pass-confirm" placeholder="••••••••" autocomplete="new-password">
              </div>
            </div>

            <div class="profile-form-actions">
              <button class="btn btn-ghost" type="button">Cancelar</button>
              <button class="btn btn-primary" type="submit">Guardar cambios</button>
            </div>
          </form>

        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-grid">
        <div class="footer-brand"><h3>Lana &amp; Lino</h3><p>Indumentaria de calidad.</p></div>
        <div class="footer-col"><h4>Navegación</h4><ul><li><a href="index.html">Catálogo</a></li></ul></div>
        <div class="footer-col"><h4>Categorías</h4><ul><li><a href="#">Remeras</a></li></ul></div>
        <div class="footer-col"><h4>Contacto</h4><ul><li><span class="footer-contact-item">✉ info@lanaylino.com</span></li></ul></div>
      </div>
    </footer>

  </div>

    <script src="js/api.js"></script>
    <script src="js/header.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
