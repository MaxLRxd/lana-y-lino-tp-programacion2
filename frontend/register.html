<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta — Lana &amp; Lino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/forms.css">
</head>
<body>

  <input type="checkbox" id="dark-mode" class="dark-mode-toggle">

  <div class="page-wrapper">

    <header class="header">
      <div class="header-inner">
        <div class="header-left">
          <nav class="dropdown">
            <button class="dropdown-trigger">Productos <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg></button>
            <div class="dropdown-menu"><a href="index.html">Todos</a></div>
          </nav>
          <div class="header-search">
            <input type="text" placeholder="Buscar productos...">
            <button type="button"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></button>
          </div>
        </div>
        <div class="header-logo"><a href="index.html">Lana &amp; Lino</a></div>
        <div class="header-actions">
          <a href="cart.html" class="icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg></a>
          <label for="dark-mode" class="dark-toggle-label"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></label>
        </div>
      </div>
    </header>

    <main class="auth-page">
      <div class="auth-card">
        <div class="auth-logo">
          <a href="index.html">Lana &amp; Lino</a>
        </div>
        <h1 class="auth-title">Crear cuenta</h1>
        <p class="auth-subtitle">Completá tus datos para registrarte</p>

        <form class="auth-form" action="#" method="post" novalidate>
          <div class="auth-row">
            <div class="form-group">
              <label class="form-label" for="reg-nombre">Nombre</label>
              <input class="form-input" type="text" id="reg-nombre" placeholder="Juan" autocomplete="given-name" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="reg-apellido">Apellido</label>
              <input class="form-input" type="text" id="reg-apellido" placeholder="Pérez" autocomplete="family-name" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-email">Email</label>
            <input class="form-input" type="email" id="reg-email" placeholder="tu@email.com" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-telefono">Teléfono</label>
            <input class="form-input" type="tel" id="reg-telefono" placeholder="+54 11 1234-5678" autocomplete="tel" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-direccion">Dirección</label>
            <input class="form-input" type="text" id="reg-direccion" placeholder="Av. Corrientes 1234, CABA" autocomplete="street-address" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-password">Contraseña</label>
            <input class="form-input" type="password" id="reg-password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-password2">Confirmar contraseña</label>
            <input class="form-input" type="password" id="reg-password2" placeholder="Repetí tu contraseña" autocomplete="new-password" required>
          </div>
          <button class="btn btn-primary btn-full btn-lg" type="submit">Crear cuenta</button>
        </form>

        <p class="auth-footer">
          ¿Ya tenés cuenta? <a href="login.html">Iniciá sesión</a>
        </p>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-grid">
        <div class="footer-brand"><h3>Lana &amp; Lino</h3><p>Indumentaria de calidad.</p></div>
        <div class="footer-col"><h4>Navegación</h4><ul><li><a href="index.html">Catálogo</a></li></ul></div>
        <div class="footer-col"><h4>Categorías</h4><ul><li><a href="#">Remeras</a></li></ul></div>
        <div class="footer-col"><h4>Contacto</h4><ul><li><span class="footer-contact-item">✉ info@lanaylino.com</span></li></ul></div>
      </div>
    </footer>

  </div>

    <script src="js/api.js"></script>
    <script src="js/header.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
